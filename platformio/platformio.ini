; ESP32-C3 Super Mini — Micro:bit Remote firmware
; Talks the rxy (abourdim.github.io/rxy) BLE protocol.
;
; Build:    pio run
; Upload:   pio run -t upload
; Monitor:  pio device monitor

[env:esp32-c3-supermini]
platform        = espressif32
board           = esp32-c3-devkitm-1
framework       = arduino
monitor_speed   = 115200
; Native USB-CDC on the ESP32-C3 misinterprets DTR/RTS toggles as the
; "enter download mode" signal — so opening pio device monitor with the
; defaults knocks the board back into the ROM bootloader. Disable both.
monitor_dtr     = 0
monitor_rts     = 0
; ESP32-C3 Super Mini uses native USB-CDC, which causes two failures
; with the default esptool flow:
;   1. The mid-upload baud switch (115200 -> 460800) crashes the CDC
;      endpoint: "No serial data received".
;   2. When the flasher stub takes over from the ROM bootloader, the
;      USB-CDC endpoint re-enumerates and the first post-stub command
;      (read flash JEDEC ID) falls into a dead window:
;      "Unable to verify flash chip connection".
; Pinning upload_speed avoids (1); --no-stub avoids (2) by using the
; ROM bootloader for the whole upload. Slower (~60-90 s) but reliable.
upload_speed    = 115200
upload_flags    = --no-stub

; The ESP32-C3 Super Mini exposes its USB-C port via the chip's native
; USB peripheral (no CH340/CP2102 bridge), so we need USB-CDC for Serial.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    h2zero/NimBLE-Arduino @ ^2.2.0

; -----------------------------------------------------------------------
; If you are using a different ESP32 board, add another [env:...] section.
; Examples:
;
;   [env:esp32-devkit]      ; classic ESP32 DevKit
;   platform   = espressif32
;   board      = esp32dev
;   framework  = arduino
;   lib_deps   = h2zero/NimBLE-Arduino @ ^2.2.0
;
;   [env:esp32-s3-supermini]
;   platform   = espressif32
;   board      = esp32-s3-devkitc-1
;   framework  = arduino
;   build_flags = -D ARDUINO_USB_MODE=1 -D ARDUINO_USB_CDC_ON_BOOT=1
;   lib_deps   = h2zero/NimBLE-Arduino @ ^2.2.0
